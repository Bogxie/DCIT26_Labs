<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>DCIT26_Lab4</title>
</head>

<body>
    <div class="calculator-container">
        <input type="text" class="display" pattern="[0-9+\-*/.]*">
        <div class="buttons">
        </div>
    </div>
    
    <div class="guide-container">
        <h3>User Guide</h3>
        <hr>
        <div class="guide-grid">
            <div class="guide-item">
                <kbd>+</kbd> <span>Addition</span>
            </div>
            <div class="guide-item">
                <kbd>-</kbd> <span>Subtraction</span>
            </div>
            <div class="guide-item">
                <kbd>*</kbd> <span>Multiplication</span>
            </div>
            <div class="guide-item">
                <kbd>/</kbd> <span>Division</span>
            </div>
            <div class="guide-item">
                <kbd>C</kbd> <span>Clear Display</span>
            </div>
            <div class="guide-item">
                <kbd>Del</kbd> <span>Delete Last</span>
            </div>
            <div class="guide-item">
                <kbd>=</kbd> <span>Calculate</span>
            </div>
        </div>
    </div>

    <script src="./script/script.js"></script>
</body>

</html>
