    <div class="contact-header">
        <h3>Contacts</h3>
    </div>

    <div class="contact-container">
        <div class="contact-item">
            <a href="https://www.facebook.com/GrandChaseClassic">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuRWkb0OdFxrApftE3y5RWD3WVFiAcGCdAaA&s"
                    alt="fb-logo">
            </a>
            <p>FaceBook</p>
        </div>
        <div class="contact-item">
            <a href="https://mail.google.com/">
                <img src="https://static.vecteezy.com/system/resources/previews/013/948/544/non_2x/gmail-logo-on-transparent-white-background-free-vector.jpg"
                    alt="Gmail-logo">
            </a>
            <p>Gmail</p>
        </div>
        <div class="contact-item">
            <a
                href="https://github.com/Bogxie">
                <img src="./Images/git.png" alt="Github-logo">
            </a>
            <p>Github</p>
        </div>
    </div>
    <div class="contact-form">
        <button>Open Contact Form</button>
    </div>

    <div id="contact-form" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <form>
                <h3>Send me a message</h3>
                <label for="">Email</label>
                <input type="email">
                <label for="">Password</label>
                <input type="password">

                <textarea name="" id="" placeholder="Ano ang iyong mensaheng gustong ipabatid?"></textarea>

                <button>Send Message</button>
            </form>
        </div>
    </div>

    <div class="return-btn">
        <button>
            <a href="./index.html">
                Back to HomePage
            </a>
        </button>
    </div>

    <script src="./Script/script4.js"></script>
